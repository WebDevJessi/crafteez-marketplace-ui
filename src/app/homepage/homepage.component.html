<div [style.background]="currentBackground" class="bg-link">
<igx-carousel indicatorsOrientation="top">

    <igx-slide *ngFor="let slide of slides">
      <div class="image-container">
        <img [src]="slide.src" />
      </div>
    </igx-slide>
  </igx-carousel>
  <p>{{appTitle}}</p>
<p>{{subTitle}}</p>
</div>
