      <mat-card-header>
        <mat-card-title-group>
          <mat-card-title>{{ product.name }}</mat-card-title>
          <mat-card-subtitle>{{ product.price | currency:'USD':'symbol':'1.2-2' }}</mat-card-subtitle>
          <img mat-card-sm-image class="image-class" [src]="product.imageUrl" [alt]="product.name">
        </mat-card-title-group>
        </mat-card-header>
        <mat-card-content class="mat-product-details">
          {{ product.description }}
        </mat-card-content>
